{% extends "base.html" %}
{% block title %}Mot de passe — Argan-Fire Watch{% endblock %}

{% block body_class %}page-auth{% endblock %}

{% block content %}
<div class="auth-layout">
  <section class="auth-card-wrap" aria-labelledby="pwd-heading">
    <div class="auth-card panel panel--glass">
      <h2 id="pwd-heading" class="auth-card__title">Changer le mot de passe</h2>
      <p class="auth-card__subtitle">Min. 8 caractères, une majuscule, un chiffre, un caractère spécial</p>

      <form class="auth-form" method="post" action="{{ url_for('changer_mot_de_passe') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <div class="form-field">
          <label class="form-label" for="old_password">Mot de passe actuel</label>
          <input class="form-input" type="password" id="old_password" name="old_password" autocomplete="current-password" required>
        </div>
        <div class="form-field">
          <label class="form-label" for="new_password">Nouveau mot de passe</label>
          <input class="form-input" type="password" id="new_password" name="new_password" autocomplete="new-password" required>
        </div>
        <div class="form-field">
          <label class="form-label" for="confirm_password">Confirmation</label>
          <input class="form-input" type="password" id="confirm_password" name="confirm_password" autocomplete="new-password" required>
        </div>
        <button type="submit" class="btn btn--primary btn--block">Enregistrer</button>
      </form>
    </div>
  </section>
</div>
{% endblock %}
